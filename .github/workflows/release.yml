name: release

# Releases are dispatched manually with a version number. The ordering
# below solves the SPM checksum chicken-and-egg: the XCFramework zip is
# built exactly once, its checksum is committed into Package.swift, and
# the version tag is created on that commit — so the Package.swift that
# SPM resolves at any tag always matches the asset of that tag's release.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (X.Y.Z, without the v prefix)"
        required: true

permissions:
  contents: write # push the release commit + tag, create the release
  packages: write # publish Maven artifacts to GitHub Packages

jobs:
  release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4

      - name: Gate on the full test suite
        run: ./gradlew :sharedLogic:allTests

      - name: Bump version (before building, so artifacts carry it)
        run: |
          sed -i '' "s/^VERSION_NAME=.*/VERSION_NAME=${{ inputs.version }}/" gradle.properties

      - name: Assemble and zip the XCFramework
        run: |
          ./gradlew :sharedLogic:assembleSharedLogicReleaseXCFramework
          cd sharedLogic/build/XCFrameworks/release
          ditto -c -k --keepParent SharedLogic.xcframework SharedLogic.xcframework.zip

      - name: Compute SPM checksum
        id: checksum
        run: |
          sum=$(swift package compute-checksum sharedLogic/build/XCFrameworks/release/SharedLogic.xcframework.zip)
          echo "sum=$sum" >> "$GITHUB_OUTPUT"

      - name: Commit Package.swift + version, tag, push
        run: |
          sed -i '' -E "s|releases/download/v[0-9.]+/|releases/download/v${{ inputs.version }}/|" Package.swift
          sed -i '' -E "s|checksum: \"[^\"]*\"|checksum: \"${{ steps.checksum.outputs.sum }}\"|" Package.swift
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gradle.properties Package.swift
          git commit -m "release: v${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push origin main "v${{ inputs.version }}"

      - name: Create GitHub Release with the XCFramework asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ inputs.version }}" \
            sharedLogic/build/XCFrameworks/release/SharedLogic.xcframework.zip \
            --title "v${{ inputs.version }}" \
            --generate-notes

      - name: Publish Maven artifacts to GitHub Packages
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ github.token }}
        run: ./gradlew :sharedLogic:publishAllPublicationsToGitHubPackagesRepository
