name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  # JVM + Android host tests and demo APK on the cheap runner.
  jvm-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Tests (JVM + Android host) and demo APK
        run: ./gradlew :sharedLogic:jvmTest :sharedLogic:testAndroid :androidApp:assembleDebug

  # Kotlin/Native tests need a macOS runner (10x cost — keep it lean).
  ios:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Kotlin/Native simulator tests
        run: ./gradlew :sharedLogic:iosSimulatorArm64Test
